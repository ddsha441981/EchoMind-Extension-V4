<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMind Transcriber</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="header-banner">
<div class="logo-container">
<svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<!-- Main microphone body -->
<defs>
<linearGradient id="micGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#ffffff" />
<stop offset="50%" style="stop-color:#f0f0f0" />
<stop offset="100%" style="stop-color:#e0e0e0" />
</linearGradient>
<linearGradient id="micShine" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:rgba(255,255,255,0.8)" />
<stop offset="50%" style="stop-color:rgba(255,255,255,0.3)" />
<stop offset="100%" style="stop-color:rgba(255,255,255,0)" />
</linearGradient>
<linearGradient id="micShadow" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:rgba(0,0,0,0.2)" />
<stop offset="100%" style="stop-color:rgba(0,0,0,0.1)" />
</linearGradient>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="4" result="blur" />
<feComposite in="SourceGraphic" in2="blur" operator="over" />
</filter>
<linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#4776E6" />
<stop offset="100%" style="stop-color:#8E54E9" />
</linearGradient>
<filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur in="SourceAlpha" stdDeviation="2" />
<feOffset dx="1" dy="2" />
<feComponentTransfer>
<feFuncA type="linear" slope="0.5" />
</feComponentTransfer>
<feMerge>
<feMergeNode />
<feMergeNode in="SourceGraphic" />
</feMerge>
</filter>
</defs>

<!-- 3D Microphone body with lighting effects -->
<g filter="url(#dropShadow)" transform="translate(50,35) scale(0.95) translate(-50,-35)">
<!-- Base shadow for 3D effect -->
<rect x="37" y="12" width="26" height="46" rx="13" ry="13" fill="url(#micShadow)" />

<!-- Main microphone body -->
<rect x="35" y="10" width="30" height="50" rx="15" ry="15" fill="url(#micGradient)" filter="url(#glow)" />

<!-- Highlight overlay for 3D effect -->
<path d="M35,25 Q35,15 45,10 L50,10 Q40,15 40,25 Z" fill="url(#micShine)" opacity="0.7" />

<!-- Microphone grille with animated lighting -->
<g class="grille">
<rect x="40" y="18" width="20" height="2.5" rx="1.25" ry="1.25" fill="#8E54E9" opacity="0.7">
<animate attributeName="opacity" values="0.7;0.4;0.7" dur="2.5s" repeatCount="indefinite" />
<animate attributeName="width" values="20;18;20" dur="2.5s" repeatCount="indefinite" />
</rect>
<rect x="40" y="25" width="20" height="2.5" rx="1.25" ry="1.25" fill="#8E54E9" opacity="0.7">
<animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite" />
<animate attributeName="width" values="20;17;20" dur="2s" repeatCount="indefinite" />
</rect>
<rect x="40" y="32" width="20" height="2.5" rx="1.25" ry="1.25" fill="#8E54E9" opacity="0.7">
<animate attributeName="opacity" values="0.7;0.5;0.7" dur="3s" repeatCount="indefinite" />
<animate attributeName="width" values="20;19;20" dur="3s" repeatCount="indefinite" />
</rect>
<rect x="40" y="39" width="20" height="2.5" rx="1.25" ry="1.25" fill="#8E54E9" opacity="0.7">
<animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.7s" repeatCount="indefinite" />
<animate attributeName="width" values="20;16;20" dur="2.7s" repeatCount="indefinite" />
</rect>
<rect x="40" y="46" width="20" height="2.5" rx="1.25" ry="1.25" fill="#8E54E9" opacity="0.7">
<animate attributeName="opacity" values="0.7;0.4;0.7" dur="2.3s" repeatCount="indefinite" />
<animate attributeName="width" values="20;18;20" dur="2.3s" repeatCount="indefinite" />
</rect>
</g>

<!-- Microphone stand with 3D effect -->
<rect x="47.5" y="60" width="5" height="15" fill="url(#micGradient)" />
<rect x="48" y="60" width="2" height="15" fill="url(#micShine)" opacity="0.5" />
<rect x="50" y="60" width="2.5" height="15" fill="url(#micShadow)" opacity="0.3" />

<!-- Base with 3D effect -->
<ellipse cx="50" cy="78" rx="20" ry="3" fill="rgba(0,0,0,0.1)" opacity="0.5" />
<rect x="30" y="75" width="40" height="6" rx="3" ry="3" fill="url(#micGradient)" />
<rect x="31" y="75" width="18" height="3" rx="1.5" ry="1.5" fill="url(#micShine)" opacity="0.5" />
<rect x="50" y="75" width="19" height="6" rx="3" ry="3" fill="url(#micShadow)" opacity="0.2" />
</g>

<!-- Animated 3D Sound waves -->
<g opacity="0.9">
<path d="M20,45 Q30,30 20,15" stroke="url(#waveGradient)" fill="none" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
<animate attributeName="d" values="M20,45 Q30,30 20,15;M20,45 Q25,30 20,15;M20,45 Q30,30 20,15" dur="2s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite" />
<animate attributeName="stroke-width" values="2.5;1.5;2.5" dur="2s" repeatCount="indefinite" />
</path>
<path d="M13,45 Q28,25 13,5" stroke="url(#waveGradient)" fill="none" stroke-width="2.5" stroke-linecap="round" opacity="0.7" filter="url(#glow)">
<animate attributeName="d" values="M13,45 Q28,25 13,5;M13,45 Q22,25 13,5;M13,45 Q28,25 13,5" dur="3s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite" />
<animate attributeName="stroke-width" values="2.5;1.5;2.5" dur="3s" repeatCount="indefinite" />
</path>
<path d="M80,45 Q70,30 80,15" stroke="url(#waveGradient)" fill="none" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
<animate attributeName="d" values="M80,45 Q70,30 80,15;M80,45 Q75,30 80,15;M80,45 Q70,30 80,15" dur="2.5s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.5s" repeatCount="indefinite" />
<animate attributeName="stroke-width" values="2.5;1.5;2.5" dur="2.5s" repeatCount="indefinite" />
</path>
<path d="M87,45 Q72,25 87,5" stroke="url(#waveGradient)" fill="none" stroke-width="2.5" stroke-linecap="round" opacity="0.7" filter="url(#glow)">
<animate attributeName="d" values="M87,45 Q72,25 87,5;M87,45 Q78,25 87,5;M87,45 Q72,25 87,5" dur="3.5s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite" />
<animate attributeName="stroke-width" values="2.5;1.5;2.5" dur="3.5s" repeatCount="indefinite" />
</path>
</g>

<!-- 3D Pulse effects around microphone -->
<circle cx="50" cy="35" r="32" fill="none" stroke="white" stroke-width="1" opacity="0.4">
<animate attributeName="r" values="32;45;32" dur="3s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite" />
</circle>
<circle cx="50" cy="35" r="38" fill="none" stroke="white" stroke-width="0.5" opacity="0.2">
<animate attributeName="r" values="38;55;38" dur="4s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.2;0;0.2" dur="4s" repeatCount="indefinite" />
</circle>

<!-- Subtle particle effects -->
<g>
<circle cx="30" cy="20" r="1" fill="white" opacity="0.6">
<animate attributeName="cy" values="20;25;20" dur="2s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
</circle>
<circle cx="70" cy="30" r="1.2" fill="white" opacity="0.5">
<animate attributeName="cy" values="30;35;30" dur="3s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite" />
</circle>
<circle cx="25" cy="50" r="0.8" fill="white" opacity="0.7">
<animate attributeName="cy" values="50;45;50" dur="2.5s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite" />
</circle>
<circle cx="75" cy="45" r="1" fill="white" opacity="0.6">
<animate attributeName="cy" values="45;50;45" dur="3.5s" repeatCount="indefinite" />
<animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite" />
</circle>
</g>
</svg>
<h3>EchoMind V4</h3>
</div>
</div>
<div class="content">
<div class="status-indicator">
<div class="indicator-dot"></div>
<span>Ready to transcribe</span>
</div>
<div class="button-container">
<button id="activateBtn" class="pulse">Activate</button>
</div>
</div>
<div class="developer-info">
Questions or feedback? Contact: <a href="mailto:codewithcup.developer@gmail.com" class="developer-email">codewithcup.developer@gmail.com</a>
</div>
<script src="popup.js"></script>
</body>
</html>
